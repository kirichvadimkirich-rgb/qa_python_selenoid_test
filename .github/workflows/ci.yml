# Имя рабочего процесса
name: Selenoid Tests Workflow

# Запуск при пуше в ветку master
on:
  push:
    branches:
      - master

jobs:
  run-selenoid-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Check out repository code
        uses: actions/checkout@v4

      # 2. Скачиваем образ браузера для Selenoid
      - name: Pull selenoid image
        run: docker pull selenoid/chrome:latest

      # 3. Запускаем тесты в Docker Compose
      - name: Run tests in docker
        run: docker compose up --build --exit-code-from test

      # 4. Устанавливаем Allure CLI (нужен для генерации отчёта)
      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz | tar -xz
          sudo mv allure-2.32.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      # 5. Генерируем HTML-отчёт из сырых результатов (папка allure-results)
      - name: Generate Allure report
        run: allure generate allure-results -o allure-report

      # 6. Загружаем сгенерированный HTML-отчёт как артефакт
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()   # загружаем даже если тесты упали
        with:
          name: allure-report
          path: allure-report/

      # (Опционально) Можно также сохранить сырые результаты, если нужно
      - name: Archive raw Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-raw
          path: allure-results/